<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sage Utopia｜同步中心</title><link rel="stylesheet" href="style.css"></head><body><div class="shell"><aside class="side"><a class="brand" href="index.html"><span class="leaf"></span><span>Sage Utopia<span class="tag">柔软有序的成长小屋</span></span></a><nav class="nav"><a href="index.html">首页</a><a href="study.html">学习中心</a><a href="career.html">求职中心</a><a href="finance.html">财务中心</a><a href="growth.html">成长记录</a><a class="active" href="sync.html">同步中心</a><a href="about.html">关于我</a><a href="resume.html">在线简历</a><a href="portfolio.html">作品集</a><a href="contact.html">联系方式</a></nav></aside><main><section class="hero"><p class="eyebrow">同步中心</p><h1>把 Moodle 截止日期带回 Sage Utopia</h1><p class="desc">这个免费静态版不保存 UNSW 密码。你可以粘贴 Moodle 导出的 iCal 内容，系统会在浏览器里本地解析。</p></section><section class="grid two"><div class="card"><h2>怎么使用</h2><p class="sub">如果 GitHub Pages 无法直接读取 Moodle 链接，就在 Moodle 里下载或复制日历内容，再粘贴到右侧。</p><p class="hint">不要把包含 authtoken 的链接发到公开页面或社交平台。</p></div><div class="card"><h2>粘贴 iCal 内容</h2><textarea id="ics" placeholder="粘贴 BEGIN:VCALENDAR 开头的日历内容"></textarea><button onclick="parseIcs()">同步到 Sage Utopia</button><div id="result" class="section"></div></div></section><script>function field(b,n){let l=b.split(/\r?\n/).find(x=>x.startsWith(n+':')||x.startsWith(n+';'));return l?l.slice(l.indexOf(':')+1).replace(/\\,/g,',').replace(/\\n/g,' ').trim():''}function date(v){let c=(v||'').replace(/\D/g,'');return c.length>=8?c.slice(0,4)+'-'+c.slice(4,6)+'-'+c.slice(6,8):'未提供日期'}function parseIcs(){let t=document.getElementById('ics').value.replace(/\r?\n[ \t]/g,'');let r=document.getElementById('result');if(!t.includes('BEGIN:VCALENDAR')){r.innerHTML='<p class="task">这看起来不是 iCal 内容。请寻找 Moodle 的导出日历或 .ics 内容。</p>';return}let blocks=t.match(/BEGIN:VEVENT[\s\S]*?END:VEVENT/g)||[];r.innerHTML=blocks.slice(0,30).map(b=>'<div class="task"><strong>'+field(b,'SUMMARY')+'</strong><p class="hint">'+date(field(b,'DTSTART'))+' · Moodle</p></div>').join('')||'<p class="task">没有找到事件。</p>'}</script></main></div></body></html>
