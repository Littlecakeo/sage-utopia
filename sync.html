  <main>
    <section class="hero">
      <p class="eyebrow">同步中心</p>
      <h1>把 Moodle 截止日期带回 Sage Utopia</h1>
      <p class="desc">粘贴 Moodle 导出的 iCal 内容，系统会在浏览器里本地解析并持久保存。解析出的截止日期可以一键导入任务列表。</p>
    </section>
    <section class="grid two">
      <div class="card">
        <h2>怎么使用</h2>
        <p class="sub">在 Moodle 里下载或复制日历内容，粘贴到右侧。</p>
        <p class="hint">不要把包含 authtoken 的链接发到公开页面或社交平台。</p>
        <h2 style="margin-top:16px">已同步事件</h2>
        <div id="result" class="section"></div>
      </div>
      <div class="card">
        <h2>粘贴 iCal 内容</h2>
        <textarea id="ics" placeholder="粘贴 BEGIN:VCALENDAR 开头的日历内容"></textarea>
        <button onclick="parseIcs()" class="mini" style="margin-top:8px">同步到 Sage Utopia</button>
        <button id="syncImportAll" onclick="syncImportAll()" class="mini" style="margin-top:8px;margin-left:4px;display:none">全部导入到任务列表</button>
      </div>
    </section>
  </main>
