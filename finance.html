<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sage Utopia｜财务中心</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="mobile-fix.css">
  <link rel="stylesheet" href="edit-mode.css">
</head>
<body>
<div class="mobile"><a class="brand" href="index.html"><span class="leaf"></span><span>Sage Utopia<span class="tag">柔软有序的成长小屋</span></span></a><div class="mobile-scroll"><a href="index.html">首页</a><a href="study.html">学习中心</a><a href="career.html">求职中心</a><a class="active" href="finance.html">财务中心</a><a href="growth.html">成长记录</a><a href="portfolio.html">作品集</a><a href="resume.html">关于 Sage</a></div></div>
<div class="shell">
  <aside class="side"><a class="brand" href="index.html"><span class="leaf"></span><span>Sage Utopia<span class="tag">柔软有序的成长小屋</span></span></a><nav class="nav"><a href="index.html">首页</a><a href="study.html">学习中心</a><a href="career.html">求职中心</a><a class="active" href="finance.html">财务中心</a><a href="growth.html">成长记录</a><a href="portfolio.html">作品集</a><a href="resume.html">关于 Sage</a></nav></aside>
  <main>
    <section class="hero">
      <p class="eyebrow">财务中心</p>
      <h1>财务中心：把每一笔生活支出轻轻放好</h1>
      <p class="desc">记录留学生活里的房租、餐饮、交通和学习支出。配置 Supabase 后，数据会保存到云端。</p>
    </section>
    <section class="grid three">
      <div class="card soft"><h2>本月支出</h2><div class="stat" id="expenseMonth">0</div><p class="hint">按支出日期统计</p></div>
      <div class="card blue"><h2>记录数量</h2><div class="stat" id="expenseCount">0</div><p class="hint">所有支出记录</p></div>
      <div class="card peach"><h2>主要分类</h2><div class="stat" id="expenseTopCategory">—</div><p class="hint">出现最多的分类</p></div>
    </section>
    <section class="card section" id="expenseFormSection">
      <h2 id="expenseFormTitle">新增支出</h2>
      <p class="sub" id="expenseMode">当前准备新增一条支出记录。</p>
      <form id="expenseForm" class="task-form">
        <input type="hidden" id="expenseId">
        <input class="field" id="expenseAmount" type="number" min="0" step="0.01" placeholder="金额（必填）" required>
        <select class="field" id="expenseCurrency"><option value="AUD">AUD</option><option value="CNY">CNY</option><option value="USD">USD</option></select>
        <select class="field" id="expenseCategory"><option value="餐饮">餐饮</option><option value="交通">交通</option><option value="房租">房租</option><option value="学习">学习</option><option value="生活">生活</option><option value="其他">其他</option></select>
        <input class="field" id="expenseDate" type="date" required>
        <input class="field" id="expenseMerchant" type="text" placeholder="商户 / 用途">
        <input class="field note-field" id="expenseNotes" type="text" placeholder="备注">
        <button type="submit" class="mini">保存支出</button>
        <button type="button" class="mini ghost" id="expenseCancelEdit">取消编辑</button>
      </form>
      <p class="unit-hint" id="expenseSyncHint">正在检查云端连接...</p>
    </section>
    <section class="card section" id="expenseListSection">
      <h2>支出列表</h2>
      <div id="expenseList"></div>
    </section>
  </main>
</div>
<script type="module" src="sage-cloud-data.js"></script>
<script src="sage-data.js"></script>
<script src="finance.js"></script>
<script src="edit-mode.js"></script>
<script src="site-shell.js"></script>
</body>
</html>
