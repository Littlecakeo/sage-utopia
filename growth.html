<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sage Utopia｜成长记录</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="mobile-fix.css">
  <link rel="stylesheet" href="edit-mode.css">
</head>
<body>
<div class="mobile"><a class="brand" href="index.html"><span class="leaf"></span><span>Sage Utopia<span class="tag">柔软有序的成长小屋</span></span></a><div class="mobile-scroll"><a href="index.html">首页</a><a href="study.html">学习中心</a><a href="career.html">求职中心</a><a href="finance.html">财务中心</a><a class="active" href="growth.html">成长记录</a><a href="portfolio.html">作品集</a><a href="resume.html">关于 Sage</a></div></div>
<div class="shell">
  <aside class="side"><a class="brand" href="index.html"><span class="leaf"></span><span>Sage Utopia<span class="tag">柔软有序的成长小屋</span></span></a><nav class="nav"><a href="index.html">首页</a><a href="study.html">学习中心</a><a href="career.html">求职中心</a><a href="finance.html">财务中心</a><a class="active" href="growth.html">成长记录</a><a href="portfolio.html">作品集</a><a href="resume.html">关于 Sage</a></nav></aside>
  <main>
    <section class="hero page-title">
      <h1>成长记录</h1>
    </section>
    <section class="grid three">
      <div class="card soft"><h2>记录数量</h2><div class="stat" id="growthCount">0</div></div>
      <div class="card blue"><h2>关键词</h2><div class="stat" id="growthKeywords">0</div></div>
      <div class="card peach"><h2>最近心情</h2><div class="stat" id="growthMood">—</div></div>
    </section>
    <section class="card section">
      <h2>写一条成长记录</h2>
      <form id="growthForm" class="task-form">
        <textarea class="field" id="growthContent" placeholder="今天有什么想记录的？（必填）" rows="3" required></textarea>
        <div class="form-row">
          <input class="field" id="growthDate" type="date">
          <select class="field" id="growthMoodSelect"><option value="平静">平静</option><option value="开心">开心</option><option value="疲惫">疲惫</option><option value="兴奋">兴奋</option><option value="焦虑">焦虑</option><option value="满足">满足</option><option value="迷茫">迷茫</option></select>
        </div>
        <input class="field" id="growthTags" type="text" placeholder="标签（用空格或逗号分隔，如：#作品集 #求职）">
        <button type="submit" class="mini">保存</button>
      </form>
    </section>
    <section class="card section">
      <h2>时间轴</h2>
      <div id="growthTimeline"></div>
    </section>
  </main>
</div>
<script type="module" src="sage-cloud-data.js"></script>
  <script src="sage-data.js"></script>
<script src="growth.js"></script>
<script src="edit-mode.js"></script>
<script src="site-shell.js?v=9"></script>
</body>
</html>
