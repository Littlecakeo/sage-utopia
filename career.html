<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="edit-mode.css">
</head>
<body>
<div class="mobile"><a class="brand" href="index.html"><span class="leaf"></span><span>Sage Utopia<span class="tag">柔软有序的成长小屋</span></span></a><div class="mobile-scroll"><a href="index.html">首页</a><a href="study.html">学习中心</a><a class="active" href="career.html">求职中心</a><a href="finance.html">财务中心</a><a href="growth.html">成长记录</a><a href="sync.html">同步中心</a><a href="about.html">关于我</a><a href="resume.html">在线简历</a><a href="portfolio.html">作品集</a><a href="contact.html">联系方式</a></div></div>
<div class="shell">
  <aside class="side"><a class="brand" href="index.html"><span class="leaf"></span><span>Sage Utopia<span class="tag">柔软有序的成长小屋</span></span></a><nav class="nav"><a href="index.html">首页</a><a href="study.html">学习中心</a><a class="active" href="career.html">求职中心</a><a href="finance.html">财务中心</a><a href="growth.html">成长记录</a><a href="sync.html">同步中心</a><a href="about.html">关于我</a><a href="resume.html">在线简历</a><a href="portfolio.html">作品集</a><a href="contact.html">联系方式</a></nav></aside>
  <main>
    <section class="hero">
      <p class="eyebrow">求职中心</p>
      <h1>把机会整理成清晰的下一步</h1>
      <p class="desc">追踪收藏、申请、面试和结果，不让任何一个机会散落在聊天记录里。</p>
    </section>
    <section class="grid three">
      <div class="card peach"><h2>总机会</h2><div class="stat" id="careerTotal">0</div></div>
      <div class="card blue"><h2>面试中</h2><div class="stat" id="careerInterview">0</div></div>
      <div class="card soft"><h2>已录取</h2><div class="stat" id="careerOffer">0</div></div>
    </section>
    <section class="card section" id="careerFormSection">
      <h2>新增机会</h2>
      <form id="careerForm" class="task-form">
        <div class="form-row">
          <input class="field" id="careerCompany" type="text" placeholder="公司名称（必填）" required>
          <input class="field" id="careerPosition" type="text" placeholder="岗位名称">
        </div>
        <div class="form-row">
          <input class="field" id="careerLocation" type="text" placeholder="地点">
          <input class="field" id="careerDate" type="date">
        </div>
        <div class="form-row">
          <select class="field" id="careerStatus">
            <option value="收藏">收藏</option>
            <option value="已申请">已申请</option>
            <option value="面试中">面试中</option>
            <option value="已录取">已录取</option>
            <option value="已拒绝">已拒绝</option>
          </select>
        </div>
        <textarea class="field" id="careerNote" placeholder="备注（可选）" rows="2"></textarea>
        <button type="submit" class="mini">保存</button>
      </form>
    </section>
    <section class="card section">
      <h2>进行中</h2>
      <div id="careerList"></div>
    </section>
    <section class="card section">
      <h2>已结束</h2>
      <div id="careerDone"></div>
    </section>
  </main>
</div>
<script src="sage-data.js"></script>
<script src="career.js"></script>
<script src="edit-mode.js"></script>
<script src="site-shell.js"></script>
</body>
</html>
