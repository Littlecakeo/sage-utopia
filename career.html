<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <script src="online-only.js"></script>
  <title>Sage Utopia｜求职中心</title>
  <link rel="icon" href="assets/sage-avatar.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="mobile-fix.css">
  <link rel="stylesheet" href="theme-refresh.css?v=10">
  <link rel="stylesheet" href="edit-mode.css?v=10">
</head>
<body>
<div class="mobile"><a class="brand" href="index.html"><span class="leaf"></span><span>Sage Utopia<span class="tag">柔软有序的成长小屋</span></span></a><div class="mobile-scroll"><a href="index.html">首页</a><a href="study.html">学习中心</a><a class="active" href="career.html">求职中心</a><a href="friends.html">留言板</a><a href="resume.html">关于 Sage</a></div></div>
<div class="shell">
  <aside class="side"><a class="brand" href="index.html"><span class="leaf"></span><span>Sage Utopia<span class="tag">柔软有序的成长小屋</span></span></a><nav class="nav"><a href="index.html">首页</a><a href="study.html">学习中心</a><a class="active" href="career.html">求职中心</a><a href="friends.html">留言板</a><a href="resume.html">关于 Sage</a></nav></aside>
  <main>
    <section class="hero page-title">
      <h1>求职中心</h1>
    </section>
    <section class="grid three" id="careerOverview">
      <div class="card peach"><h2>总机会</h2><div class="stat" id="careerTotal">0</div></div>
      <div class="card blue"><h2>面试中</h2><div class="stat" id="careerInterview">0</div></div>
      <div class="card soft"><h2>已录取</h2><div class="stat" id="careerOffer">0</div></div>
    </section>
    <section class="card section" id="careerFormSection">
      <h2 id="careerFormTitle">新增机会</h2>
      <p class="sub" id="careerMode">当前准备新增一条申请记录。</p>
      <form id="careerForm" class="task-form">
        <input type="hidden" id="careerId">
        <div class="form-row">
          <input class="field" id="careerCompany" type="text" placeholder="公司名称（必填）" required>
          <input class="field" id="careerPosition" type="text" placeholder="岗位名称">
        </div>
        <div class="form-row">
          <input class="field" id="careerLocation" type="text" placeholder="地点">
          <input class="field" id="careerDate" type="date">
        </div>
        <div class="form-row">
          <select class="field" id="careerStatus">
            <option value="收藏">收藏</option>
            <option value="已申请">已申请</option>
            <option value="面试中">面试中</option>
            <option value="已录取">已录取</option>
            <option value="已拒绝">已拒绝</option>
        </select>
        </div>
        <input class="field" id="careerLink" type="url" placeholder="职位链接（可选）">
        <textarea class="field" id="careerNote" placeholder="备注（可选）" rows="2"></textarea>
        <button type="submit" class="mini">保存</button>
        <button type="button" class="mini ghost" id="careerCancelEdit">取消编辑</button>
      </form>
    </section>
    <section class="card section" id="careerListSection">
      <h2>进行中</h2>
      <div id="careerList"></div>
    </section>
    <section class="card section" id="careerDoneSection">
      <h2>已结束</h2>
      <div id="careerDone"></div>
    </section>
  </main>
</div>
<script src="sage-env.js"></script>
<script type="module" src="sage-cloud-data.js"></script>
<script src="sage-data.js"></script>
<script src="career.js"></script>
<script src="edit-mode.js?v=10"></script>
<script src="site-shell.js?v=10"></script>
</body>
</html>
