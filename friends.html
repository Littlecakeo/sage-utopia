<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <script src="online-only.js"></script>
  <title>Sage Utopia｜朋友留言板</title>
  <link rel="icon" href="assets/sage-avatar.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="guestbook.css">
  <script>
    (function () {
      var isFile = location.protocol === 'file:';
      if (/[?&]friend(?:Name|Username|Password)=/.test(location.search)) {
        history.replaceState(history.state || {}, '', location.pathname + (location.hash || ''));
      }
      if (isFile) document.documentElement.classList.add('sage-file-mode');
      document.addEventListener('submit', function (event) {
        if (!isFile || !event.target || !event.target.matches('#friendGateForm,#guestbookForm')) return;
        event.preventDefault();
        event.stopPropagation();
      }, true);
      if (isFile) {
        document.addEventListener('DOMContentLoaded', function () {
          var error = document.getElementById('friendGateError');
          var button = document.querySelector('#friendGateForm button[type="submit"]');
          if (error) error.textContent = '本地文件不能登录云端留言板，请打开上方线上留言板链接。';
          if (button) button.disabled = true;
        });
      }
    })();
  </script>
</head>
<body class="friend-page" data-public-page="friends">
  <div class="file-mode-banner" role="status">
    你现在打开的是本地文件，本地文件不能连接云端留言板，也不能读取线上 Sage 登录状态。
    <a href="https://sage-utopia.vercel.app/friends.html">打开线上留言板</a>
  </div>
  <div class="friend-shell">
    <header class="friend-top">
      <a class="friend-brand" href="index.html">
        <span class="leaf"></span>
        <span>Sage Utopia<small>朋友留言板</small></span>
      </a>
      <nav class="friend-nav" aria-label="朋友入口导航">
        <a class="active" href="#guestbook">留言板</a>
        <a href="index.html">返回首页</a>
      </nav>
    </header>

    <main>
      <section class="friend-hero">
        <div class="friend-title-card">
          <h1>Sage 的留言板</h1>
          <ul class="friend-rules" aria-label="留言板规则">
            <li>第一次进入时设置昵称、用户名和密码</li>
            <li>之后用同一组用户名密码回来继续留言</li>
          </ul>
        </div>

        <section class="friend-gate-card" id="friendGate" aria-label="朋友入口">
          <h2>Sage</h2>
          <p>留言会公开贴在这块校园留言板上；之后用同一组用户名和密码回来，可以删除自己写过的小纸条。</p>
          <form class="friend-form" id="friendGateForm" action="javascript:void(0)" onsubmit="return false">
            <div class="avatar-picker" aria-label="朋友头像">
              <button class="friend-avatar-choice" id="friendAvatarButton" type="button" aria-label="切换头像">
                <span id="friendAvatarPreview">🌱</span>
              </button>
              <input id="friendAvatarInput" type="file" accept="image/*" hidden>
              <span>点击头像上传图片</span>
            </div>
            <input class="friend-field" id="friendName" name="friendName" autocomplete="name" maxlength="40" placeholder="昵称 例如 小林🌱 / Lin!" required>
            <input class="friend-field" id="friendUsername" name="friendUsername" autocomplete="username" maxlength="32" placeholder="用户名 仅英文/数字/符号" required>
            <input class="friend-field" id="friendPassword" name="friendPassword" type="password" autocomplete="off" autocapitalize="none" spellcheck="false" minlength="4" placeholder="密码" required>
            <label class="remember-line">
              <input id="friendRemember" type="checkbox" checked>
              <span>记住这台设备的昵称和用户名</span>
            </label>
            <button class="friend-button" type="submit">进入留言板</button>
          </form>
          <p class="friend-error" id="friendGateError" role="status" aria-live="polite"></p>
        </section>
      </section>

      <div id="friendArea" hidden>
        <section class="friend-section" id="guestbook">
          <div style="display:flex;align-items:start;justify-content:space-between;gap:12px;flex-wrap:wrap">
            <div>
              <h2>校园留言板</h2>
              <p class="sub">欢迎你，<span class="friend-name-line"><span class="friend-inline-avatar" id="friendVisitorAvatar">🌱</span><span id="friendVisitorName">朋友</span></span>。<span id="friendModeHint">写完后所有朋友都能看到。</span></p>
            </div>
            <button class="friend-chip" id="friendSwitchName" type="button">退出当前账号</button>
          </div>

          <div class="guestbook-board">
            <div class="guestbook-context" aria-label="留言说明">
              <strong>写什么都可以轻一点。</strong>
              <span>近况、祝福、emoji、中英文都可以；所有进入留言板的朋友可见，只有发布者或 Sage 可以删除对应留言。</span>
            </div>
            <form class="guestbook-compose" id="guestbookForm" data-guest-write="true" action="javascript:void(0)" onsubmit="return false">
              <label>
                留一张小纸条
                <textarea class="friend-message" id="guestbookMessage" maxlength="500" placeholder="可以写祝福、近况、悄悄话、emoji、中文、英文或符号。" required></textarea>
              </label>
              <fieldset class="note-customizer" aria-label="选择便利贴样式">
                <legend>选便利贴</legend>
                <div class="note-option-row" aria-label="便利贴颜色">
                  <button class="note-choice note-color-choice is-selected" type="button" data-note-color="#fff8cf" aria-pressed="true"><span style="--swatch:#fff8cf"></span>奶油黄</button>
                  <button class="note-choice note-color-choice" type="button" data-note-color="#e6f2df" aria-pressed="false"><span style="--swatch:#e6f2df"></span>抹茶绿</button>
                  <button class="note-choice note-color-choice" type="button" data-note-color="#dff0ee" aria-pressed="false"><span style="--swatch:#dff0ee"></span>薄荷蓝</button>
                  <button class="note-choice note-color-choice" type="button" data-note-color="#f7eadf" aria-pressed="false"><span style="--swatch:#f7eadf"></span>桃子米</button>
                  <button class="note-choice note-color-choice" type="button" data-note-color="#eee6f6" aria-pressed="false"><span style="--swatch:#eee6f6"></span>桔梗紫</button>
                  <button class="note-choice note-color-choice" type="button" data-note-color="#f9e6ea" aria-pressed="false"><span style="--swatch:#f9e6ea"></span>莓果粉</button>
                  <button class="note-choice note-color-choice" type="button" data-note-color="#e9efd9" aria-pressed="false"><span style="--swatch:#e9efd9"></span>青柠纸</button>
                  <button class="note-choice note-color-choice" type="button" data-note-color="#e9e4d4" aria-pressed="false"><span style="--swatch:#e9e4d4"></span>旧书页</button>
                </div>
              </fieldset>
              <button class="friend-button guestbook-submit" type="submit">贴上去</button>
            </form>
            <p class="friend-status" id="guestbookStatus" role="status" aria-live="polite"></p>
            <div class="note-grid" id="guestbookList" aria-live="polite"></div>
          </div>
        </section>

      </div>
    </main>
  </div>

  <script src="sage-env.js"></script>
  <script type="module" src="sage-cloud-data.js"></script>
  <script src="guestbook.js?v=2"></script>
</body>
</html>
